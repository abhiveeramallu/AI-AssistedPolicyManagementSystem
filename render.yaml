services:
  - type: web
    name: secure-policy-api
    runtime: node
    rootDir: backend
    plan: free
    autoDeploy: true
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "10000"
      - key: CORS_ORIGIN
        fromService:
          type: web
          name: secure-policy-app
          envVarKey: RENDER_EXTERNAL_URL
      - key: ACCESS_JWT_SECRET
        generateValue: true
      - key: ACCESS_JWT_EXPIRES_IN
        value: 1h
      - key: FILE_TOKEN_SECRET
        generateValue: true
      - key: FILE_TOKEN_EXPIRES_IN
        value: 30m
      - key: MASTER_ENCRYPTION_KEY
        generateValue: true
      - key: ENCRYPTED_STORAGE_PATH
        value: ./storage/encrypted
      - key: LOCAL_DB_PATH
        value: ./storage/local-db.json
      - key: MAX_FILE_SIZE_MB
        value: "15"
      - key: ALLOWED_FILE_TYPES
        value: application/pdf,image/png,image/jpeg,text/plain,application/vnd.openxmlformats-officedocument.wordprocessingml.document
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_BASE_URL
        value: https://api.openai.com/v1
      - key: OPENAI_API_KEY
        sync: false
      - key: ENABLE_DEV_AUTH_ENDPOINT
        value: "false"
      - key: BOOTSTRAP_LOGIN_EMAIL
        value: owner@example.com
      - key: BOOTSTRAP_LOGIN_ROLE
        value: admin
      - key: BOOTSTRAP_LOGIN_PASSWORD
        sync: false

  - type: web
    name: secure-policy-app
    runtime: static
    rootDir: frontend
    autoDeploy: true
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        fromService:
          type: web
          name: secure-policy-api
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_ENABLE_DEV_AUTH
        value: "false"
